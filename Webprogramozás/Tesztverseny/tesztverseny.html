<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesztverseny</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body onload="betolt()">

    <div class="col-12 bg-dark text-white">Tesztverseny</div>
    <div class="container">
        <div class="row">
            <div></div>
        </div>
    </div>


    <!--<progress></progress>-->

    <script>
        

        let adatok = [];

        let helyesValaszok = "";

        function betolt()
        {
            fetch("valaszok.txt")
            .then(x => x.text())
            .then(y => 
                {
                    //console.log(y);

                    let sorok = y.split("\r\n");

                    //console.log(sorok);

                    helyesValaszok = sorok.shift();
                    
                    //console.log(helyesValaszok)
                    //console.log(sorok);
                    sorok.pop();

                    sorok.forEach(e =>
                        {
                            adatok.push({kod:e.split(" ")[0],valaszok:e.split(" ")[1]})
                        }
                    )

                    console.log(adatok)


                }
            )
        }


        

    </script>
</body>
</html>
