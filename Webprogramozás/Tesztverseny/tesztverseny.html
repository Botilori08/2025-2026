<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesztverseny</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <style>

        .valaszJelolo
        {
            width: 25px;
            height: 25px;
            _border: 1px solid black;
            _display: inline-block;
            box-sizing: content-box;
        }


    </style>

</head>
<body onload="betolt()">

    <header class="col-12 bg-dark text-white"><h2 class="p-2">Tesztverseny</h2></header>
    <div class="container">
        <div class="row">
            <div class="col-6">
                <h2>2. feladat</h2>
                <p>A vetélkedőn <span id="f2" class="bg-success text-white p-1 rounded fw-bold"></span> versenyző indult.</p>

            </div>
            <div class="col-6">
                <h2>3. feladat</h2>
                
                <label for="kod">A versenyző azonosítója:</label>
                <input type="text" class="input input-group form-control shadow-sm" id="kod" >
                <div class="text-center p-2"><button type="button" class="btn btn-dark" onclick="feladat3()">Küldés</button></div>
                <div id="eredmeny" class="border"></div>

                <h3>Helyes megoldás</h3>
                <div id="helyes" class="border"></div>

            </div>
            <div class="col-6">
                <h2>5. feladat</h2>
                
                <label for="kod">A feladat sorszáma:</label>
                <input type="number" class="input input-group form-control shadow-sm" id="sorszam" min="1" max="14">

                <div class="text-center p-2"><button type="button" class="btn btn-dark" onclick="feladat5()">Küldés</button></div>

                <div id="f5eredmeny">
                    <p>A feladatra <span id="f5Fo"></span> fő, a versenyzők <span id="f5Szazalek"></span>-a adott helyes választ. </p>

                    <progress id="f5Progress" value="" class="progress-bar" max="100"></progress>

                </div>

            </div>

            <div class="col-6 mt-2">
                <h2>6. feladat</h2>
                
                <table class="table">
                    <thead>
                        <tr>
                            <th scope="col">Kód</th>
                            <th scope="col">Pontszám</th>
                            <th scope="col"></th>
                        </tr>
                    </thead>
                    <tbody id="f6Tabla">

                    </tbody>

                </table>
                
            </div>
        </div>
    </div>


    <!--<progress></progress>-->

    <script>
        

        let adatok = [];

        let helyesValaszok = "";

        function betolt()
        {
            fetch("valaszok.txt")
            .then(x => x.text())
            .then(y => 
                {
                    //console.log(y);
                    let sorok = y.split("\r\n");
                    //console.log(sorok);
                    helyesValaszok = sorok.shift();
                    //console.log(helyesValaszok)
                    //console.log(sorok);
                    sorok.pop();

                    adatok = sorok.map(e => new Object({kod:e.split(" ")[0],valaszok:e.split(" ")[1]}));
                    //Vagy return {kod:e.split(" ")[0],valaszok:e.split(" ")[1]}  

                    //adatok = sorok.map(e => e.split(" "));

                    console.log(adatok)

                    feladat2();


                }
            
            )
            .then(x => feladat6());
            
        }


        function feladat2()
        {
            document.getElementById("f2").innerHTML = adatok.length;
        }

        function feladat3()
        {
            let kod = document.getElementById("kod").value.toUpperCase();

            let versenyzoAdat = adatok.filter(e => kod == e.kod)

            console.log(versenyzoAdat)

            if(versenyzoAdat.length == 0)
            {
                return;
            }

            document.getElementById("eredmeny").innerHTML = "";
            document.getElementById("eredmeny").appendChild(valaszMegjelenit(versenyzoAdat[0].valaszok,true));

            document.getElementById("helyes").innerHTML = "";
            document.getElementById("helyes").appendChild(valaszMegjelenit(helyesValaszok));

        }
        
        function valaszMegjelenit(valaszok,javitasKell = false)
        {
            
            let gyujto = document.createElement("div");


            
            valaszok.split("").forEach((e,i) => {
                let div = document.createElement("div")

                if(javitasKell)
                {
                    if(e != helyesValaszok[i])
                    {
                        /*div.classList.add("border")
                        div.classList.add("border-danger")
                        div.classList.add("border-3")*/

                        div.classList.add("bg-danger")

                    }
                }

                div.classList.add("valaszJelolo")
                div.classList.add("d-inline-block")
                //div.classList.add(`${e}`)
                div.classList.add("text-white")
                div.classList.add("text-center")
                switch(e)
                {
                    case "A": div.classList.add("bg-primary")
                        break;
                    case "B": div.classList.add("bg-success")
                        break;
                    case "C": div.classList.add("bg-info")
                        break;  
                    case "D": div.classList.add("bg-warning")
                        break;
                    case "X": div.classList.add("bg-secondary")
                        break;       
                }

                div.innerHTML = e;
                gyujto.appendChild(div);
            });

            return gyujto;
        }

        function feladat5()
        {

            let sorszam = parseInt(document.getElementById("sorszam").value)-1;

            console.log(sorszam)

            const szurt = adatok.filter(e => 
                {
                    return e.valaszok[sorszam] == helyesValaszok[sorszam];
                }
            )

            //console.log(szurt.length)

            document.getElementById("f5Fo").innerHTML = szurt.length;

            document.getElementById("f5Szazalek").innerHTML = ((szurt.length / adatok.length)*100).toFixed(2)+"%";

            document.getElementById("f5Progress").value = ((szurt.length / adatok.length)*100).toFixed(2);

        }

        function feladat6()
        {
            //console.log("szia")
        }


    </script>
</body>
</html>
