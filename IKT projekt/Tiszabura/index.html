<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMSZ Adatok</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <style>

        span
        {
            border-radius: 5px;

        }


    </style>

</head>
<body onload="alert()">
    <div class="bg-danger mb-0 text-white"><p>MMSZ Adatok</p></div>

    <div class="container">
        <div class="row">
            <div class="col-lg-6 pt-2">
                <h2>1.feladat</h2>
                A leggyakoribb családnév a(z): <span id="feladat1-eredmeny" class="bg-warning text-white p-1">Eredmény</span>
            </div>

        </div>
        <div class="row">
            <div class="col-lg-6 pt-2">
                <h2>2.feladat</h2>
                A leggyakoribb családnév a(z): <span id="feladat2-eredmeny" class="bg-success text-white p-1">Eredmény</span>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-6 pt-2">
                <h2>3.feladat</h2>
                A leggyakoribb második utónév a(z): <span id="feladat3-eredmeny" class="bg-primary text-white p-1">Eredmény</span>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-6 pt-2">
                <h2>4.feladat</h2>
                A leggyakoribb utolsó utónév a(z): <span id="feladat4-eredmeny" class="bg-danger text-white p-1">Eredmény</span>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8 pt-2">
                <h2>5.feladat</h2>
                <h3>Rendezése</h3>
                <input type="radio" class="form-check-input" id="ABCszerint" name="valaszt">
                <label for="ABCszerint" class="form-check-label">Nevek szerint (ABC)</label>

                <input type="radio" class="form-check-input" id="novekvoSorrend" name="valaszt">
                <label for="novekvoSorrend" class="form-check-label">Darabszám szerint (növekvő)</label>

                <input type="radio" class="form-check-input" id="csokkenoSorrend" name="valaszt">
                <label for="csokkenoSorrend" class="form-check-label">Darabszám szerint (csökkenő)</label>

                <table class="table">
                    <thead>
                        <tr>
                            <th scope="col">Családnév</th>
                            <th scope="col">Darabszám</th>
                        </tr>

                    </thead>
                    <tbody id="f5Tabla">
                        
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        
        let adatok = [];

        document.body.onload=betolt();

        function betolt()
        {
            fetch("nevek.txt")
            .then(x => x.text())
            .then(y => 
                {

                    let sorok = y.split("\r\n");

                    sorok.forEach(e =>
                        {
                            let elem = e.split(";");
                            adatok.push({osztaly : elem[0],nev : elem[1],osztalyfonok : elem[2]})
                        }
                    )
                    
                    adatok.pop();

                    console.log(adatok)

                        feladat1();
                        feladat2();
                        feladat3();
                        feladat4();
                        feladat5();
                }
            )



        }


        function feladat1()
        {
            let vezeteknevek = [];

            
            vezeteknevek = adatok.map(e => e.nev.split(" ")[0]);
            

            let vezeteknevStat = {};

            vezeteknevek.forEach(e => 
                {
                    if(Object.keys(vezeteknevStat).includes(e))
                    {
                        vezeteknevStat[e]++;
                    }
                    else
                    {
                        vezeteknevStat[e] = 1;
                    }
                }
            )

            console.log(vezeteknevStat);

            let legnagyobb;
            let legtobb = 0;
            Object.keys(vezeteknevStat).forEach(e =>
               {
                    if(vezeteknevStat[e] > legtobb)
                    {
                        legnagyobb = e;
                        legtobb = vezeteknevStat[e];
                    }
               } 
            )
            console.log(legnagyobb);
            
            document.getElementById("feladat1-eredmeny").innerHTML = legnagyobb

        }

        function feladat2()
        {
            let keresztnevek = [];

            
            keresztnevek = adatok.map(e => e.nev.split(" ")[1]);
            

            let keresztnevStat = {};

            keresztnevek.forEach(e => 
                {
                    if(Object.keys(keresztnevStat).includes(e))
                    {
                        keresztnevStat[e]++;
                    }
                    else
                    {
                        keresztnevStat[e] = 1;
                    }
                }
            )

            console.log(keresztnevStat);

            let legnagyobb;
            let legtobb = 0;
            Object.keys(keresztnevStat).forEach(e =>
               {
                    if(keresztnevStat[e] > legtobb)
                    {
                        legnagyobb = e;
                        legtobb = keresztnevStat[e];
                    }
               } 
            )
            console.log(legnagyobb);
            
            document.getElementById("feladat2-eredmeny").innerHTML = legnagyobb
        }

        function feladat3()
        {
            let ketkeresztnevuek = [];

            adatok.forEach(e => {
                if(e.nev.split(" ").length > 2)
                {
                    ketkeresztnevuek.push(e);
                }
            }
            );
            console.log(ketkeresztnevuek);



            masodikUtonevek = ketkeresztnevuek.map(e => e.nev.split(" ")[2]);

            utonevStat = {};

            console.log(masodikUtonevek);
            masodikUtonevek.forEach(e => 
                {
                    if(Object.keys(utonevStat).includes(e))
                    {
                        utonevStat[e]++;
                    }
                    else
                    {
                        utonevStat[e] = 1;
                    }
                }
            );

            let legtobb = "";
            let legnagyobb = 0;
            Object.keys(utonevStat).forEach(e =>
                {
                    if(utonevStat[e] > legnagyobb)
                    {
                        legtobb = e;
                        legnagyobb = utonevStat[e];
                    }
                }
            )

            document.getElementById("feladat3-eredmeny").innerHTML = legtobb;
        }


        function feladat4()
        {
            let vezeteknevekLast = [];


            
            vezeteknevekLast = adatok.map(e => e.nev.split(" ")[e.nev.split(" ").length-1]);
            
            console.log(vezeteknevekLast)

            let vezeteknevStat = {};

            vezeteknevekLast.forEach(e => 
                {
                    if(Object.keys(vezeteknevStat).includes(e))
                    {
                        vezeteknevStat[e]++;
                    }
                    else
                    {
                        vezeteknevStat[e] = 1;
                    }
                }
            )

            console.log(vezeteknevStat);

            let legnagyobb;
            let legtobb = 0;
            Object.keys(vezeteknevStat).forEach(e =>
               {
                    if(vezeteknevStat[e] > legtobb)
                    {
                        legnagyobb = e;
                        legtobb = vezeteknevStat[e];
                    }
               } 
            )
            console.log(legnagyobb);
            
            document.getElementById("feladat4-eredmeny").innerHTML = legnagyobb
        }

        function feladat5()
        {
            let csaladnevek = [];

                        let vezeteknevek = [];

            
            csaladnevek = adatok.map(e => e.nev.split(" ")[0]);
            

            let csaladnevStat = {};

            csaladnevek.forEach(e => 
                {
                    if(Object.keys(csaladnevStat).includes(e))
                    {
                        csaladnevStat[e]++;
                    }
                    else
                    {
                        csaladnevStat[e] = 1;
                    }
                }
            )

            let tabla = document.getElementById("f5Tabla");

            f5Tabla.innerHTML = "";

            Object.keys(csaladnevStat).forEach(e =>
                {
                    let sor = document.createElement("tr");

                    let cella = document.createElement("td");
                    cella.innerHTML = e;
                    sor.appendChild(cella);

                    cella = document.createElement("td");
                    cella.innerHTML = csaladnevStat[e];
                    sor.appendChild(cella);

                    tabla.appendChild(sor);
                                        

                }
            )

        }


    </script>
</body>
</html>
